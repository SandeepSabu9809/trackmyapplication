<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trackr Pro // Mobile Interview Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased min-h-screen pb-32">

    <!-- Header & Metrics Dashboard -->
    <header class="sticky top-0 bg-slate-900/90 backdrop-blur-md border-b border-slate-800 z-30 px-4 py-4">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <h1 class="text-xl font-bold tracking-tight text-indigo-400 flex items-center gap-2">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Trackr<span class="text-xs font-light text-slate-500">Pro</span>
            </h1>
            <div class="flex gap-3 text-xs font-medium text-slate-400">
                <div>Total: <span id="metric-total" class="text-slate-100 font-bold">0</span></div>
                <div>Active: <span id="metric-active" class="text-amber-400 font-bold">0</span></div>
                <div>Offers: <span id="metric-offers" class="text-emerald-400 font-bold">0</span></div>
            </div>
        </div>
    </header>

    <!-- Main Content Container -->
    <main class="max-w-md mx-auto px-4 mt-4">
        
        <!-- NEW COMPONENT: Mobile Resume Center Hub -->
        <div class="bg-slate-800/40 border border-slate-800 rounded-xl p-4 mb-5">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider flex items-center gap-1.5">
                    <i data-lucide="file-text" class="w-4 h-4 text-indigo-400"></i> My Active Resume
                </h3>
                <span id="resume-status" class="text-[11px] font-medium text-slate-500">No file uploaded</span>
            </div>
            
            <div class="flex gap-2 items-center">
                <!-- Hidden native input, triggered by custom beautiful styling label -->
                <label class="flex-1 bg-slate-900 border border-slate-700 hover:border-slate-600 rounded-lg py-2.5 px-3 flex items-center justify-center gap-2 cursor-pointer transition-colors text-xs font-medium">
                    <i data-lucide="upload-cloud" class="w-4 h-4 text-slate-400"></i>
                    <span id="upload-label">Upload New File</span>
                    <input type="file" id="resume-input" accept=".pdf,.doc,.docx" class="hidden" onchange="handleResumeUpload(event)">
                </label>
                
                <!-- Quick Download action view item -->
                <button id="download-resume-btn" onclick="downloadResume()" disabled class="p-2.5 bg-indigo-600/20 text-indigo-400 border border-indigo-500/20 rounded-lg disabled:opacity-30 disabled:pointer-events-none transition-all" title="Download Resume">
                    <i data-lucide="download" class="w-4 h-4"></i>
                </button>
                
                <!-- Delete Resume Document Entry -->
                <button id="delete-resume-btn" onclick="deleteResume()" disabled class="p-2.5 bg-rose-600/30 text-rose-400 border border-rose-500/20 rounded-lg disabled:opacity-30 disabled:pointer-events-none transition-all" title="Remove Resume">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
        
        <!-- Filter Pills Navigation -->
        <div class="flex gap-2 overflow-x-auto pb-3 mb-4 no-scrollbar" id="filter-tabs">
            <button onclick="setFilter('All')" class="filter-tab px-4 py-2 text-xs font-semibold rounded-full bg-indigo-600 text-white shadow-sm transition-all whitespace-nowrap" data-filter="All">All</button>
            <button onclick="setFilter('Applied')" class="filter-tab px-4 py-2 text-xs font-semibold rounded-full bg-slate-800 text-slate-400 transition-all whitespace-nowrap" data-filter="Applied">Applied</button>
            <button onclick="setFilter('Interviewing')" class="filter-tab px-4 py-2 text-xs font-semibold rounded-full bg-slate-800 text-slate-400 transition-all whitespace-nowrap" data-filter="Interviewing">Interviews</button>
            <button onclick="setFilter('Offer')" class="filter-tab px-4 py-2 text-xs font-semibold rounded-full bg-slate-800 text-slate-400 transition-all whitespace-nowrap" data-filter="Offer">Offers</button>
            <button onclick="setFilter('Rejected')" class="filter-tab px-4 py-2 text-xs font-semibold rounded-full bg-slate-800 text-slate-400 transition-all whitespace-nowrap" data-filter="Rejected">Archived</button>
        </div>

        <!-- Applications Feed Container -->
        <div id="applications-feed" class="space-y-4">
            <!-- JavaScript dynamically injects entries here -->
        </div>

        <!-- Empty State Fallback -->
        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-16 text-slate-500 text-center">
            <i data-lucide="folder-open" class="w-12 h-12 mb-2 stroke-[1.5]"></i>
            <p class="text-sm">No job matches found in this screen view.</p>
        </div>
    </main>

    <!-- Floating Trigger Bottom Sheet Button -->
    <div class="fixed bottom-6 left-0 right-0 px-4 z-40 max-w-md mx-auto">
        <button onclick="toggleForm(true)" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3.5 px-4 rounded-xl shadow-xl shadow-indigo-900/40 flex items-center justify-center gap-2 active:scale-[0.99] transition-transform text-base">
            <i data-lucide="plus-circle" class="w-5 h-5"></i> Add Application Details
        </button>
    </div>

    <!-- Interactive Mobile Drawer Panel (Slide Up Bottom Sheet) -->
    <div id="form-overlay" class="fixed inset-0 bg-black/70 z-50 transition-opacity opacity-0 pointer-events-none duration-300" onclick="toggleForm(false)">
        <div id="form-sheet" class="absolute bottom-0 left-0 right-0 max-w-md mx-auto bg-slate-800 rounded-t-2xl p-6 transform translate-y-full transition-transform duration-300 ease-out overflow-y-auto max-h-[90vh]" onclick="event.stopPropagation()">
            
            <div class="w-12 h-1 bg-slate-700 rounded-full mx-auto mb-5"></div>
            
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-lg font-bold text-slate-100 flex items-center gap-2">
                    <i data-lucide="file-plus" class="text-indigo-400 w-5 h-5"></i> New Job Profile
                </h3>
                <button onclick="toggleForm(false)" class="text-slate-400 p-1"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>

            <form id="app-form" onsubmit="saveApplication(event)" class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Company</label>
                        <input type="text" id="form-company" required placeholder="e.g. Apple" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2.5 text-slate-100 text-base focus:outline-none focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Role / Title</label>
                        <input type="text" id="form-role" required placeholder="e.g. Designer" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2.5 text-slate-100 text-base focus:outline-none focus:border-indigo-500">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Status</label>
                        <select id="form-status" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2.5 text-slate-100 text-base focus:outline-none focus:border-indigo-500">
                            <option value="Applied">Applied</option>
                            <option value="Interviewing">Interviewing</option>
                            <option value="Offer">Offer</option>
                            <option value="Rejected">Rejected</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Applied Date</label>
                        <input type="date" id="form-date" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2.5 text-slate-100 text-base focus:outline-none focus:border-indigo-500">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Compensation / Salary</label>
                    <input type="text" id="form-salary" placeholder="e.g. $120k - $140k" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2.5 text-slate-100 text-base focus:outline-none focus:border-indigo-500">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Job Post URL</label>
                    <input type="url" id="form-link" placeholder="https://linkedin.com/jobs/..." class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2.5 text-slate-100 text-base focus:outline-none focus:border-indigo-500">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Point of Contact / Recruiter</label>
                    <input type="text" id="form-contact" placeholder="e.g. Sarah Jenkins" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2.5 text-slate-100 text-base focus:outline-none focus:border-indigo-500">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Next Step / Deadline (Optional)</label>
                    <input type="date" id="form-deadline" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2.5 text-slate-100 text-base focus:outline-none focus:border-indigo-500">
                </div>

                <button type="submit" class="w-full bg-indigo-600 text-white font-semibold py-3.5 rounded-xl mt-4 active:scale-[0.98] transition-transform shadow-md">
                    Commit to Tracker Registry
                </button>
            </form>
        </div>
    </div>

    <!-- Application Script Logic Block Architecture -->
    <script>
        // Data Structures Initialization
        let apps = JSON.parse(localStorage.getItem('interview_tracker_pro_apps')) || [
            { id: 1, company: 'Netflix', role: 'Senior Product Engineer', status: 'Interviewing', date: '2026-06-01', salary: '$210,000 base', link: 'https://netflix.com/careers', contact: 'Marcus Vance', deadline: '2026-06-12' }
        ];
        
        let currentFilter = 'All';

        const statusConfig = {
            'Applied': { bg: 'bg-blue-500/10', text: 'text-blue-400', border: 'border-blue-500/25' },
            'Interviewing': { bg: 'bg-amber-500/10', text: 'text-amber-400', border: 'border-amber-500/25' },
            'Offer': { bg: 'bg-emerald-500/10', text: 'text-emerald-400', border: 'border-emerald-500/25' },
            'Rejected': { bg: 'bg-slate-500/10', text: 'text-slate-400', border: 'border-slate-500/25' }
        };

        // NEW METHOD: Process upload, converting raw binary into Base64 format string chunks for storage
        function handleResumeUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Enforce a sensible client-side file size constraint (2.5MB max for local browser storage bounds)
            if (file.size > 2.5 * 1024 * 1024) {
                alert("File is too large! Please select a file smaller than 2.5MB.");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const resumeData = {
                    name: file.name,
                    dataUrl: e.target.result
                };
                localStorage.setItem('stored_resume_profile', JSON.stringify(resumeData));
                renderResumeSection();
            };
            reader.readAsDataURL(file);
        }

        // NEW METHOD: Trigger browser down-stream event channels mimicking remote server binary downloads
        function downloadResume() {
            const resumeJSON = localStorage.getItem('stored_resume_profile');
            if (!resumeJSON) return;

            const resume = JSON.parse(resumeJSON);
            const downloadLink = document.createElement("a");
            downloadLink.href = resume.dataUrl;
            downloadLink.download = resume.name;
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        }

        // NEW METHOD: Delete cached portfolio document records
        function deleteResume() {
            if (confirm("Are you sure you want to remove your stored resume file?")) {
                localStorage.removeItem('stored_resume_profile');
                document.getElementById('resume-input').value = ""; // Clear file selector buffer
                renderResumeSection();
            }
        }

        // NEW METHOD: Update visual status indications across the tracking control bars
        function renderResumeSection() {
            const resumeJSON = localStorage.getItem('stored_resume_profile');
            const statusText = document.getElementById('resume-status');
            const uploadLabel = document.getElementById('upload-label');
            const downloadBtn = document.getElementById('download-resume-btn');
            const deleteBtn = document.getElementById('delete-resume-btn');

            if (resumeJSON) {
                const resume = JSON.parse(resumeJSON);
                statusText.innerText = "Ready";
                statusText.className = "text-[11px] font-bold text-emerald-400 bg-emerald-500/10 px-2 py-0.5 rounded";
                uploadLabel.innerText = "Replace Document";
                downloadBtn.removeAttribute('disabled');
                deleteBtn.removeAttribute('disabled');
            } else {
                statusText.innerText = "No file uploaded";
                statusText.className = "text-[11px] font-medium text-slate-500";
                uploadLabel.innerText = "Upload Resume File";
                downloadBtn.setAttribute('disabled', 'true');
                deleteBtn.setAttribute('disabled', 'true');
            }
        }

        function toggleForm(show) {
            const overlay = document.getElementById('form-overlay');
            const sheet = document.getElementById('form-sheet');
            
            if(show) {
                document.getElementById('form-date').value = new Date().toISOString().split('T')[0];
                overlay.classList.remove('pointer-events-none', 'opacity-0');
                sheet.classList.remove('translate-y-full');
            } else {
                overlay.classList.add('opacity-0', 'pointer-events-none');
                sheet.classList.add('translate-y-full');
                document.getElementById('app-form').reset();
            }
        }

        function saveApplication(e) {
            e.preventDefault();
            const newApp = {
                id: Date.now(),
                company: document.getElementById('form-company').value,
                role: document.getElementById('form-role').value,
                status: document.getElementById('form-status').value,
                date: document.getElementById('form-date').value,
                salary: document.getElementById('form-salary').value,
                link: document.getElementById('form-link').value,
                contact: document.getElementById('form-contact').value,
                deadline: document.getElementById('form-deadline').value
            };

            apps.unshift(newApp);
            syncData();
            toggleForm(false);
        }

        function cycleStatus(id, event) {
            event.stopPropagation();
            const statusOrder = ['Applied', 'Interviewing', 'Offer', 'Rejected'];
            apps = apps.map(app => {
                if(app.id === id) {
                    const currentIndex = statusOrder.indexOf(app.status);
                    const nextIndex = (currentIndex + 1) % statusOrder.length;
                    app.status = statusOrder[nextIndex];
                }
                return app;
            });
            syncData();
        }

        function deleteApp(id, event) {
            event.stopPropagation();
            if(confirm('Delete application record?')) {
                apps = apps.filter(app => app.id !== id);
                syncData();
            }
        }

        function setFilter(filterType) {
            currentFilter = filterType;
            document.querySelectorAll('.filter-tab').forEach(tab => {
                if(tab.getAttribute('data-filter') === filterType) {
                    tab.className = "filter-tab px-4 py-2 text-xs font-semibold rounded-full bg-indigo-600 text-white shadow-sm transition-all whitespace-nowrap";
                } else {
                    tab.className = "filter-tab px-4 py-2 text-xs font-semibold rounded-full bg-slate-800 text-slate-400 transition-all whitespace-nowrap";
                }
            });
            render();
        }

        function syncData() {
            localStorage.setItem('interview_tracker_pro_apps', JSON.stringify(apps));
            render();
        }

        function render() {
            const feed = document.getElementById('applications-feed');
            const emptyState = document.getElementById('empty-state');
            
            document.getElementById('metric-total').innerText = apps.length;
            document.getElementById('metric-active').innerText = apps.filter(a => a.status === 'Interviewing' || a.status === 'Applied').length;
            document.getElementById('metric-offers').innerText = apps.filter(a => a.status === 'Offer').length;

            const filteredApps = apps.filter(app => currentFilter === 'All' || app.status === currentFilter);

            if(filteredApps.length === 0) {
                feed.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            feed.innerHTML = filteredApps.map(app => {
                const conf = statusConfig[app.status];
                const appDate = new Date(app.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                
                let deadlineBadge = '';
                if(app.deadline) {
                    const deadDate = new Date(app.deadline).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                    deadlineBadge = `
                        <div class="mt-2 inline-flex items-center gap-1 text-[11px] font-medium bg-rose-500/10 text-rose-400 px-2 py-0.5 rounded-md border border-rose-500/20">
                            <i data-lucide="clock" class="w-3 h-3"></i> Next Step: ${deadDate}
                        </div>
                    `;
                }

                const salaryRow = app.salary ? `
                    <div class="flex items-center gap-1.5 text-xs text-slate-300 font-medium">
                        <i data-lucide="banknote" class="w-3.5 h-3.5 text-emerald-500"></i> ${app.salary}
                    </div>` : '';

                const contactRow = app.contact ? `
                    <div class="flex items-center gap-1.5 text-xs text-slate-400 truncate">
                        <i data-lucide="user" class="w-3.5 h-3.5 text-slate-500"></i> ${app.contact}
                    </div>` : '';

                const linkElement = app.link ? `
                    <a href="${app.link}" target="_blank" onclick="event.stopPropagation()" class="p-2 text-indigo-400 bg-slate-900 rounded-lg hover:text-indigo-300 border border-slate-700/50">
                        <i data-lucide="external-link" class="w-4 h-4"></i>
                    </a>` : '';

                return `
                    <div class="bg-slate-800/50 border border-slate-800 rounded-xl p-4 flex flex-col justify-between gap-3 shadow-sm">
                        <div class="flex justify-between items-start gap-2">
                            <div class="min-w-0 flex-1">
                                <h4 class="text-base font-bold text-slate-100 truncate">${app.company}</h4>
                                <p class="text-xs text-slate-400 font-medium truncate mt-0.5">${app.role}</p>
                            </div>
                            <button onclick="cycleStatus(${app.id}, event)" class="px-2.5 py-1 text-xs font-bold rounded-lg border ${conf.bg} ${conf.text} ${conf.border} transition-all tracking-wide">
                                ${app.status}
                            </button>
                        </div>

                        <div class="space-y-1.5 border-t border-slate-800/60 pt-3">
                            ${salaryRow}
                            ${contactRow}
                        </div>

                        <div class="flex justify-between items-center border-t border-slate-800/60 pt-3 mt-1">
                            <div class="flex flex-col items-start">
                                <span class="text-[11px] text-slate-500 font-medium flex items-center gap-1">
                                    <i data-lucide="calendar" class="w-3 h-3"></i> Filed ${appDate}
                                </span>
                                ${deadlineBadge}
                            </div>
                            
                            <div class="flex items-center gap-2">
                                ${linkElement}
                                <button onclick="deleteApp(${app.id}, event)" class="text-slate-500 p-2 hover:text-rose-400 transition-all">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            lucide.createIcons();
        }

        document.addEventListener("DOMContentLoaded", () => {
            renderResumeSection();
            render();
        });
    </script>
</body>
</html>

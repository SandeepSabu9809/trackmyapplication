<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trackr Pro // Cross-Device Mobile Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen pb-32">

    <header class="sticky top-0 bg-white/90 backdrop-blur-md border-b border-slate-200 z-30 px-4 py-4 shadow-sm">
        <div class="max-w-md mx-auto flex items-center justify-between">
            <h1 class="text-xl font-bold tracking-tight text-indigo-600 flex items-center gap-2">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> 
                <span>Trackr<span class="text-xs font-light text-slate-400">Pro</span></span>
                <span id="cloud-indicator" class="w-2 h-2 rounded-full bg-amber-400 inline-block animate-pulse" title="Syncing..."></span>
            </h1>
            <div class="flex gap-3 text-xs font-semibold text-slate-500">
                <div>Total: <span id="metric-total" class="text-slate-800 font-bold">0</span></div>
                <div>Active: <span id="metric-active" class="text-amber-600 font-bold">0</span></div>
                <div>Offers: <span id="metric-offers" class="text-emerald-600 font-bold">0</span></div>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-4">
        
        <div class="bg-white border border-slate-200 rounded-xl p-4 mb-5 shadow-sm">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider flex items-center gap-1.5">
                    <i data-lucide="file-text" class="w-4 h-4 text-indigo-500"></i> My Active Resume (Cloud Linked)
                </h3>
                <span id="resume-status" class="text-[11px] font-semibold text-slate-400">No file uploaded</span>
            </div>
            
            <div class="flex gap-2 items-center">
                <label class="flex-1 bg-slate-50 border border-slate-200 hover:border-slate-300 rounded-lg py-2.5 px-3 flex items-center justify-center gap-2 cursor-pointer transition-colors text-xs font-semibold text-slate-600">
                    <i data-lucide="upload-cloud" class="w-4 h-4 text-slate-400"></i>
                    <span id="upload-label">Upload New File</span>
                    <input type="file" id="resume-input" accept=".pdf,.doc,.docx" class="hidden" onchange="handleResumeUpload(event)">
                </label>
                
                <button id="download-resume-btn" onclick="downloadResume()" disabled class="p-2.5 bg-indigo-50 text-indigo-600 border border-indigo-100 rounded-lg disabled:opacity-30 disabled:pointer-events-none transition-all" title="Download Resume">
                    <i data-lucide="download" class="w-4 h-4"></i>
                </button>
                
                <button id="delete-resume-btn" onclick="deleteResume()" disabled class="p-2.5 bg-rose-50 text-rose-600 border border-rose-100 rounded-lg disabled:opacity-30 disabled:pointer-events-none transition-all" title="Remove Resume">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
        
        <div class="flex gap-2 overflow-x-auto pb-3 mb-4 no-scrollbar" id="filter-tabs">
            <button onclick="setFilter('All')" class="filter-tab px-4 py-2 text-xs font-semibold rounded-full bg-indigo-600 text-white shadow-sm transition-all whitespace-nowrap" data-filter="All">All</button>
            <button onclick="setFilter('Applied')" class="filter-tab px-4 py-2 text-xs font-semibold rounded-full bg-white border border-slate-200 text-slate-500 transition-all whitespace-nowrap" data-filter="Applied">Applied</button>
            <button onclick="setFilter('Interviewing')" class="filter-tab px-4 py-2 text-xs font-semibold rounded-full bg-white border border-slate-200 text-slate-500 transition-all whitespace-nowrap" data-filter="Interviewing">Interviews</button>
            <button onclick="setFilter('Offer')" class="filter-tab px-4 py-2 text-xs font-semibold rounded-full bg-white border border-slate-200 text-slate-500 transition-all whitespace-nowrap" data-filter="Offer">Offers</button>
            <button onclick="setFilter('Rejected')" class="filter-tab px-4 py-2 text-xs font-semibold rounded-full bg-white border border-slate-200 text-slate-500 transition-all whitespace-nowrap" data-filter="Rejected">Archived</button>
        </div>

        <div id="applications-feed" class="space-y-4"></div>

        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-16 text-slate-400 text-center">
            <i data-lucide="folder-open" class="w-12 h-12 mb-2 stroke-[1.5]"></i>
            <p class="text-sm">No job matches found in this screen view.</p>
        </div>
    </main>

    <div class="fixed bottom-6 left-0 right-0 px-4 z-40 max-w-md mx-auto">
        <button onclick="toggleForm(true)" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3.5 px-4 rounded-xl shadow-lg shadow-indigo-600/20 flex items-center justify-center gap-2 active:scale-[0.99] transition-transform text-base">
            <i data-lucide="plus-circle" class="w-5 h-5"></i> Add Application Details
        </button>
    </div>

    <div id="form-overlay" class="fixed inset-0 bg-slate-900/40 z-50 transition-opacity opacity-0 pointer-events-none duration-300" onclick="toggleForm(false)">
        <div id="form-sheet" class="absolute bottom-0 left-0 right-0 max-w-md mx-auto bg-white rounded-t-2xl p-6 transform translate-y-full transition-transform duration-300 ease-out overflow-y-auto max-h-[90vh] shadow-2xl" onclick="event.stopPropagation()">
            <div class="w-12 h-1 bg-slate-200 rounded-full mx-auto mb-5"></div>
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="file-plus" class="text-indigo-600 w-5 h-5"></i> New Job Profile
                </h3>
                <button onclick="toggleForm(false)" class="text-slate-400 p-1"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>

            <form id="app-form" onsubmit="saveApplication(event)" class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Company</label>
                        <input type="text" id="form-company" required placeholder="e.g. Apple" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-slate-800 text-base focus:outline-none focus:border-indigo-500 focus:bg-white">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Role / Title</label>
                        <input type="text" id="form-role" required placeholder="e.g. Designer" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-slate-800 text-base focus:outline-none focus:border-indigo-500 focus:bg-white">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Status</label>
                        <select id="form-status" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-slate-800 text-base focus:outline-none focus:border-indigo-500 focus:bg-white">
                            <option value="Applied">Applied</option>
                            <option value="Interviewing">Interviewing</option>
                            <option value="Offer">Offer</option>
                            <option value="Rejected">Rejected</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Applied Date</label>
                        <input type="date" id="form-date" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-slate-800 text-base focus:outline-none focus:border-indigo-500 focus:bg-white">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Compensation / Salary</label>
                    <input type="text" id="form-salary" placeholder="e.g. $120k - $140k" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-slate-800 text-base focus:outline-none focus:border-indigo-500 focus:bg-white">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Job Post URL</label>
                    <input type="url" id="form-link" placeholder="https://linkedin.com/jobs/..." class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-slate-800 text-base focus:outline-none focus:border-indigo-500 focus:bg-white">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Point of Contact / Recruiter</label>
                    <input type="text" id="form-contact" placeholder="e.g. Sarah Jenkins" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-slate-800 text-base focus:outline-none focus:border-indigo-500 focus:bg-white">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Next Step / Deadline (Optional)</label>
                    <input type="date" id="form-deadline" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-slate-800 text-base focus:outline-none focus:border-indigo-500 focus:bg-white">
                </div>

                <button type="submit" class="w-full bg-indigo-600 text-white font-semibold py-3.5 rounded-xl mt-4 active:scale-[0.98] transition-transform shadow-md">
                    Commit to Tracker Registry
                </button>
            </form>
        </div>
    </div>

    <script>
    const FB_URL = 'https://trackerpro-15c96-default-rtdb.firebaseio.com';
    const LS_APPS = 'interview_tracker_pro_apps';
    const LS_RESUME = 'stored_resume_profile';

    let apps = JSON.parse(localStorage.getItem(LS_APPS) || '[]');
    let currentFilter = 'All';
    let syncTimer = null;
    let isSyncing = false;

    const statusConfig = {
        'Applied':      { bg: 'bg-blue-50',    text: 'text-blue-600',    border: 'border-blue-100'   },
        'Interviewing': { bg: 'bg-amber-50',   text: 'text-amber-700',   border: 'border-amber-100'  },
        'Offer':        { bg: 'bg-emerald-50', text: 'text-emerald-700', border: 'border-emerald-100' },
        'Rejected':     { bg: 'bg-slate-100',  text: 'text-slate-600',   border: 'border-slate-200'  }
    };

    function setVisualIndicator(state) {
        const ind = document.getElementById('cloud-indicator');
        if (!ind) return;
        ind.classList.remove('bg-amber-400', 'bg-emerald-500', 'bg-rose-500', 'animate-pulse');
        if (state === 'syncing') {
            ind.classList.add('bg-amber-400', 'animate-pulse');
        } else if (state === 'online') {
            ind.classList.add('bg-emerald-500');
        } else {
            ind.classList.add('bg-rose-500');
        }
    }

    async function pushToCloud() {
        if (isSyncing) return;
        isSyncing = true;
        setVisualIndicator('syncing');
        try {
            const payload = { apps };
            await fetch(`${FB_URL}/data/apps.json`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            setVisualIndicator('online');
        } catch (e) {
            setVisualIndicator('offline');
            console.error('Push failed', e);
        }
        isSyncing = false;
    }

    async function pushResume() {
        const resumeJSON = localStorage.getItem(LS_RESUME);
        try {
            await fetch(`${FB_URL}/data/resume.json`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ resume: resumeJSON || null })
            });
        } catch (e) {
            console.error('Resume push failed', e);
        }
    }

    async function pullFromCloud() {
        setVisualIndicator('syncing');
        try {
            // Pull apps
            const res = await fetch(`${FB_URL}/data/apps.json`);
            if (res.ok) {
                const data = await res.json();
                if (data?.apps) {
                    apps = data.apps;
                    localStorage.setItem(LS_APPS, JSON.stringify(apps));
                    render();
                }
            }
            // Pull resume
            const rRes = await fetch(`${FB_URL}/data/resume.json`);
            if (rRes.ok) {
                const rData = await rRes.json();
                if (rData?.resume) {
                    localStorage.setItem(LS_RESUME, rData.resume);
                } else {
                    localStorage.removeItem(LS_RESUME);
                }
                renderResumeSection();
            }
            setVisualIndicator('online');
        } catch (e) {
            setVisualIndicator('offline');
            console.warn('Pull failed', e);
        }
    }

    function debouncedPush() {
        clearTimeout(syncTimer);
        syncTimer = setTimeout(pushToCloud, 800);
    }

    function handleResumeUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        if (file.size > 1.2 * 1024 * 1024) {
            alert("File size alert: Please compress your document below 1.2MB.");
            return;
        }
        const reader = new FileReader();
        reader.onload = function(e) {
            localStorage.setItem(LS_RESUME, JSON.stringify({ name: file.name, dataUrl: e.target.result }));
            renderResumeSection();
            pushResume();
        };
        reader.readAsDataURL(file);
    }

    function downloadResume() {
        const resumeJSON = localStorage.getItem(LS_RESUME);
        if (!resumeJSON) return;
        const resume = JSON.parse(resumeJSON);
        const a = document.createElement("a");
        a.href = resume.dataUrl; a.download = resume.name;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }

    function deleteResume() {
        if (confirm("Purge asset across synced nodes?")) {
            localStorage.removeItem(LS_RESUME);
            document.getElementById('resume-input').value = "";
            renderResumeSection();
            pushResume();
        }
    }

    function renderResumeSection() {
        const resumeJSON = localStorage.getItem(LS_RESUME);
        const statusText = document.getElementById('resume-status');
        const uploadLabel = document.getElementById('upload-label');
        const downloadBtn = document.getElementById('download-resume-btn');
        const deleteBtn = document.getElementById('delete-resume-btn');
        if (resumeJSON) {
            statusText.innerText = "Ready";
            statusText.className = "text-[11px] font-bold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded";
            uploadLabel.innerText = "Replace Document";
            downloadBtn.removeAttribute('disabled');
            deleteBtn.removeAttribute('disabled');
        } else {
            statusText.innerText = "No file uploaded";
            statusText.className = "text-[11px] font-medium text-slate-400";
            uploadLabel.innerText = "Upload New File";
            downloadBtn.setAttribute('disabled', 'true');
            deleteBtn.setAttribute('disabled', 'true');
        }
    }

    function toggleForm(show) {
        const overlay = document.getElementById('form-overlay');
        const sheet = document.getElementById('form-sheet');
        if (show) {
            document.getElementById('form-date').value = new Date().toISOString().split('T')[0];
            overlay.classList.remove('pointer-events-none', 'opacity-0');
            sheet.classList.remove('translate-y-full');
        } else {
            overlay.classList.add('opacity-0', 'pointer-events-none');
            sheet.classList.add('translate-y-full');
            document.getElementById('app-form').reset();
        }
    }

    function saveApplication(e) {
        e.preventDefault();
        const newApp = {
            id: Date.now(),
            company: document.getElementById('form-company').value,
            role: document.getElementById('form-role').value,
            status: document.getElementById('form-status').value,
            date: document.getElementById('form-date').value,
            salary: document.getElementById('form-salary').value,
            link: document.getElementById('form-link').value,
            contact: document.getElementById('form-contact').value,
            deadline: document.getElementById('form-deadline').value
        };
        apps.unshift(newApp);
        syncData();
        toggleForm(false);
    }

    function cycleStatus(id, event) {
        event.stopPropagation();
        const statusOrder = ['Applied', 'Interviewing', 'Offer', 'Rejected'];
        apps = apps.map(app => {
            if (app.id === id) {
                const next = (statusOrder.indexOf(app.status) + 1) % statusOrder.length;
                app.status = statusOrder[next];
            }
            return app;
        });
        syncData();
    }

    function deleteApp(id, event) {
        event.stopPropagation();
        if (confirm('Delete application record?')) {
            apps = apps.filter(app => app.id !== id);
            syncData();
        }
    }

    function setFilter(filterType) {
        currentFilter = filterType;
        document.querySelectorAll('.filter-tab').forEach(tab => {
            if (tab.getAttribute('data-filter') === filterType) {
                tab.className = "filter-tab px-4 py-2 text-xs font-semibold rounded-full bg-indigo-600 text-white shadow-sm transition-all whitespace-nowrap";
            } else {
                tab.className = "filter-tab px-4 py-2 text-xs font-semibold rounded-full bg-white border border-slate-200 text-slate-500 transition-all whitespace-nowrap";
            }
        });
        render();
    }

    function syncData() {
        localStorage.setItem(LS_APPS, JSON.stringify(apps));
        render();
        debouncedPush();
    }

    function render() {
        const feed = document.getElementById('applications-feed');
        const emptyState = document.getElementById('empty-state');

        document.getElementById('metric-total').innerText = apps.length;
        document.getElementById('metric-active').innerText = apps.filter(a => a.status === 'Interviewing' || a.status === 'Applied').length;
        document.getElementById('metric-offers').innerText = apps.filter(a => a.status === 'Offer').length;

        const filteredApps = apps.filter(app => currentFilter === 'All' || app.status === currentFilter);

        if (filteredApps.length === 0) {
            feed.innerHTML = '';
            emptyState.classList.remove('hidden');
            return;
        }
        emptyState.classList.add('hidden');

        feed.innerHTML = filteredApps.map(app => {
            const conf = statusConfig[app.status];
            const appDate = new Date(app.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

            let deadlineBadge = '';
            if (app.deadline) {
                const deadDate = new Date(app.deadline).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                deadlineBadge = `
                    <div class="mt-2 inline-flex items-center gap-1 text-[11px] font-semibold bg-rose-50 text-rose-600 px-2 py-0.5 rounded-md border border-rose-100">
                        <i data-lucide="clock" class="w-3.5 h-3.5"></i> Next Step: ${deadDate}
                    </div>`;
            }

            const salaryRow = app.salary ? `
                <div class="flex items-center gap-1.5 text-xs text-slate-600 font-medium">
                    <i data-lucide="banknote" class="w-3.5 h-3.5 text-emerald-600"></i> ${app.salary}
                </div>` : '';

            const contactRow = app.contact ? `
                <div class="flex items-center gap-1.5 text-xs text-slate-500 truncate">
                    <i data-lucide="user" class="w-3.5 h-3.5 text-slate-400"></i> ${app.contact}
                </div>` : '';

            const linkElement = app.link ? `
                <a href="${app.link}" target="_blank" onclick="event.stopPropagation()" class="p-2 text-indigo-600 bg-slate-50 rounded-lg hover:text-indigo-700 border border-slate-200">
                    <i data-lucide="external-link" class="w-4 h-4"></i>
                </a>` : '';

            return `
                <div class="bg-white border border-slate-200 rounded-xl p-4 flex flex-col justify-between gap-3 shadow-sm">
                    <div class="flex justify-between items-start gap-2">
                        <div class="min-w-0 flex-1">
                            <h4 class="text-base font-bold text-slate-800 truncate">${app.company}</h4>
                            <p class="text-xs text-slate-500 font-medium truncate mt-0.5">${app.role}</p>
                        </div>
                        <button onclick="cycleStatus(${app.id}, event)" class="px-2.5 py-1 text-xs font-bold rounded-lg border ${conf.bg} ${conf.text} ${conf.border} transition-all tracking-wide">
                            ${app.status}
                        </button>
                    </div>
                    <div class="space-y-1.5 border-t border-slate-100 pt-3">
                        ${salaryRow}
                        ${contactRow}
                    </div>
                    <div class="flex justify-between items-center border-t border-slate-100 pt-3 mt-1">
                        <div class="flex flex-col items-start">
                            <span class="text-[11px] text-slate-400 font-semibold flex items-center gap-1">
                                <i data-lucide="calendar" class="w-3 h-3"></i> Filed ${appDate}
                            </span>
                            ${deadlineBadge}
                        </div>
                        <div class="flex items-center gap-2">
                            ${linkElement}
                            <button onclick="deleteApp(${app.id}, event)" class="text-slate-400 p-2 hover:text-rose-600 transition-all">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>`;
        }).join('');

        lucide.createIcons();
    }

    document.addEventListener("DOMContentLoaded", async () => {
        renderResumeSection();
        render();
        await pullFromCloud();
        setInterval(pullFromCloud, 15000);
    });
    </script>
</body>
</html>
